<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Compier O&A — Projecten</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --orange: #E8611A;
    --orange-dim: #b54c12;
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --green: #4caf6e;
    --yellow: #d4a017;
    --blue: #4a90d9;
    --red: #c0392b;
    --purple: #8e6bbf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-bar { width: 4px; height: 26px; background: var(--orange); border-radius: 2px; }
  .logo-text { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px; letter-spacing: 0.05em; }
  .logo-sub { font-size: 10px; color: var(--muted); font-weight: 300; letter-spacing: 0.08em; text-transform: uppercase; }

  .header-stats { display: flex; gap: 20px; }
  .stat { text-align: right; }
  .stat-num { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; color: var(--orange); line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  .api-banner {
    background: rgba(232,97,26,0.08);
    border-bottom: 1px solid rgba(232,97,26,0.2);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .api-banner input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    outline: none;
  }
  .api-banner input:focus { border-color: var(--orange); }
  .api-banner label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .api-save-btn {
    padding: 7px 14px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .api-save-btn:hover { background: var(--orange-dim); }
  .api-status { font-size: 11px; color: var(--green); white-space: nowrap; }
  .api-status.missing { color: var(--red); }

  .toolbar {
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .search-wrap { position: relative; flex: 1; min-width: 160px; }
  .search-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px 8px 34px;
    border-radius: 4px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--orange); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }

  .filter-btns { display: flex; gap: 5px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 11px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--orange); color: var(--orange); }
  .filter-btn.active { background: var(--orange); border-color: var(--orange); color: white; }

  .btn-add {
    padding: 8px 14px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-add:hover { background: var(--orange-dim); }

  .main { padding: 16px 20px; }

  .cards { display: none; flex-direction: column; gap: 10px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--orange); }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .card-num { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--orange); }
  .card-addr { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  .card-client { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .card-actie { font-size: 12px; color: var(--text); }
  .card-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }
  .card-date.urgent { color: var(--red); }
  .card-date.soon { color: var(--yellow); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
  th {
    padding: 10px 14px;
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  th:hover { color: var(--orange); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 11px 14px; vertical-align: middle; }
  .proj-num { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--orange); }
  .proj-addr { font-size: 13px; color: var(--text); font-weight: 500; }
  .proj-client { font-size: 12px; color: var(--muted); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.03em; white-space: nowrap;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .s-offerte    { background: rgba(74,144,217,0.15); color: var(--blue); }
  .s-offerte .status-dot { background: var(--blue); }
  .s-lopend     { background: rgba(76,175,110,0.15); color: var(--green); }
  .s-lopend .status-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .s-wacht      { background: rgba(212,160,23,0.15); color: var(--yellow); }
  .s-wacht .status-dot { background: var(--yellow); }
  .s-oplevering { background: rgba(142,107,191,0.15); color: var(--purple); }
  .s-oplevering .status-dot { background: var(--purple); }
  .s-klaar      { background: rgba(102,102,102,0.15); color: var(--muted); }
  .s-klaar .status-dot { background: var(--muted); }

  .actie-cell { font-size: 12px; color: var(--text); max-width: 200px; }
  .actie-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
  .actie-date.urgent { color: var(--red); }
  .actie-date.soon   { color: var(--yellow); }
  .empty-state { padding: 50px 24px; text-align: center; color: var(--muted); font-size: 13px; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 1000;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    width: 100%; max-width: 560px;
    padding: 24px 20px;
    max-height: 92vh;
    overflow-y: auto;
    animation: slideUp 0.22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
  .modal-title { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--orange); margin-bottom: 16px; letter-spacing: 0.05em; }

  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 16px;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--orange); background: rgba(232,97,26,0.05); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 22px; margin-bottom: 6px; }
  .upload-text { font-size: 12px; color: var(--muted); }
  .upload-text strong { color: var(--orange); }


  .btn-uitlezen {
    width: 100%;
    padding: 10px;
    background: rgba(232,97,26,0.12);
    border: 1.5px solid var(--orange);
    color: var(--orange);
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    transition: all 0.15s;
  }
  .btn-uitlezen:hover { background: var(--orange); color: white; }
  .ai-loading {
    display: none; align-items: center; gap: 10px;
    padding: 12px 14px; background: rgba(232,97,26,0.07);
    border-radius: 6px; margin-bottom: 14px;
    font-size: 12px; color: var(--orange);
  }
  .ai-loading.show { display: flex; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(232,97,26,0.2);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-result {
    display: none;
    background: rgba(76,175,110,0.08);
    border: 1px solid rgba(76,175,110,0.2);
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--green);
  }
  .ai-result.show { display: block; }
  .ai-result.error {
    background: rgba(192,57,43,0.08);
    border-color: rgba(192,57,43,0.3);
    color: var(--red);
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
  input[type=text], input[type=date], select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 4px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }
  input[type=text]:focus, input[type=date]:focus, select:focus, textarea:focus { border-color: var(--orange); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 56px; }

  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    padding: 9px 16px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 4px; font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--muted); }
  .btn-agenda {
    padding: 9px 12px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-agenda:hover { border-color: var(--blue); color: var(--blue); }
  .btn-agenda.success { border-color: var(--green); color: var(--green); }
  .btn-save {
    padding: 9px 20px; background: var(--orange); border: none; color: white;
    border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    font-weight: 600; cursor: pointer; letter-spacing: 0.05em; transition: background 0.15s;
  }
  .btn-save:hover { background: var(--orange-dim); }
  .btn-delete {
    padding: 9px 14px; background: transparent; border: 1px solid var(--red);
    color: var(--red); border-radius: 4px; font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px; cursor: pointer; margin-right: auto; transition: all 0.15s;
  }
  .btn-delete:hover { background: rgba(192,57,43,0.15); }

  @media (max-width: 700px) {
    .table-wrap { display: none; }
    .cards { display: flex; }
    .filter-btns { display: none; }
    header { padding: 12px 16px; }
    .toolbar { padding: 12px 16px; }
    .main { padding: 14px 16px; }
  }
  @media (min-width: 701px) {
    .modal-overlay { align-items: center; }
    .modal { border-radius: 8px; max-width: 540px; }
    .modal-handle { display: none; }
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<script>
const STATUS_LABELS = { offerte:'Offerte', lopend:'Lopend', wacht:'Wacht op materiaal', oplevering:'Oplevering', klaar:'Klaar' };
const STATUS_CLASS  = { offerte:'s-offerte', lopend:'s-lopend', wacht:'s-wacht', oplevering:'s-oplevering', klaar:'s-klaar' };

let projecten = [
  { id:1, nummer:'152839', adres:'Julianastraat 14, Purmerend', opdrachtgever:'Prinsenstichting', status:'lopend', actie:'Oplevering inplannen', datum:'2026-03-10', contact:'', notitie:'' },
  { id:2, nummer:'153001', adres:'Kerkstraat 88, Bunnik', opdrachtgever:'Gemeente Bunnik', status:'offerte', actie:'Offerte versturen', datum:'2026-03-07', contact:'', notitie:'Werk Bunnik upgrade' },
];
let nextId = 100;
let activeFilter = 'alle';
let searchQuery = '';
let editingId = null;
let sortKey = 'datum';
let sortDir = 1;

let apiKey = localStorage.getItem('compier_api_key') || '';
let sbUrl = localStorage.getItem('compier_sb_url') || '';
let sbKey = localStorage.getItem('compier_sb_key') || '';


// ── Supabase ──────────────────────────────────────────────
async function sbFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'apikey': sbKey,
      'Authorization': 'Bearer ' + sbKey,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(sbUrl + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  return method === 'DELETE' ? null : res.json();
}

async function laadProjecten() {
  if (!sbUrl || !sbKey) return;
  try {
    const data = await sbFetch('projecten?order=id.asc');
    if (Array.isArray(data) && data.length > 0) {
      projecten = data;
      nextId = Math.max(...projecten.map(p => p.id)) + 1;
      render();
    }
  } catch(e) {
    console.warn('Laden mislukt:', e.message);
  }
}

async function slaOpInDb(project) {
  if (!sbUrl || !sbKey) return;
  try {
    if (editingId) {
      await sbFetch('projecten?id=eq.' + project.id, 'PATCH', project);
    } else {
      await sbFetch('projecten', 'POST', project);
    }
  } catch(e) {
    console.warn('Opslaan mislukt:', e.message);
  }
}

async function verwijderUitDb(id) {
  if (!sbUrl || !sbKey) return;
  try {
    await sbFetch('projecten?id=eq.' + id, 'DELETE');
  } catch(e) {
    console.warn('Verwijderen mislukt:', e.message);
  }
}
// ─────────────────────────────────────────────────────────

function initApiKey() {
  if (apiKey) document.getElementById('api-key-input').value = apiKey;
  if (sbUrl)  document.getElementById('sb-url-input').value = sbUrl;
  if (sbKey)  document.getElementById('sb-key-input').value = sbKey;
  updateApiStatus();
}

function updateApiStatus() {
  const s = document.getElementById('api-status');
  if (apiKey && sbUrl && sbKey) { s.textContent = '✓ Alles ingesteld'; s.className = 'api-status'; }
  else if (apiKey) { s.textContent = '⚠ Supabase ontbreekt'; s.className = 'api-status missing'; }
  else { s.textContent = 'Niet ingesteld'; s.className = 'api-status missing'; }
}

function saveApiKey() {
  apiKey = document.getElementById('api-key-input').value.trim();
  sbUrl  = document.getElementById('sb-url-input').value.trim().replace(/\/+$/, '');
  sbKey  = document.getElementById('sb-key-input').value.trim();
  localStorage.setItem('compier_api_key', apiKey);
  localStorage.setItem('compier_sb_url', sbUrl);
  localStorage.setItem('compier_sb_key', sbKey);
  updateApiStatus();
  if (sbUrl && sbKey) laadProjecten();
}

async function uitLezenBon() {
  const tekst = document.getElementById('bon-tekst').value.trim();
  if (!tekst) { alert('Plak eerst de tekst van de bon.'); return; }
  if (!apiKey) { alert('Vul eerst je API key in bovenaan de pagina.'); return; }

  document.getElementById('ai-loading').classList.add('show');
  const resultEl = document.getElementById('ai-result');
  resultEl.className = 'ai-result';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: `Dit is een Nederlandse opdrachtbon of offerte-aanvraag van Compier O&A. Extraheer de volgende velden en geef ALLEEN een geldig JSON-object terug, geen uitleg, geen markdown.

Velden:
- nummer: kenmerk of referentienummer (bijv. "M2603 0024"), of leeg als niet aanwezig
- adres: volledig werklocatie-adres (straat + huisnummer + postcode + plaats)
- opdrachtgever: de overkoepelende organisatie (niet de afdeling) van de persoon die de brief ondertekent met 'Met vriendelijke groet' of vergelijkbare afsluiting. Gebruik de organisatienaam, niet een afdeling zoals 'Servicedesk Facilitair'.
- contact: de naam die onder "Met vriendelijke groet" staat (de ondertekenaar) plus diens telefoonnummer, formaat "Naam — telefoonnummer"
- aanmelder: de contactpersoon op de werklocatie (bijv. vermeld als "Naam aanmelder" of "contactpersoon ter plaatse"), formaat "Naam — telefoonnummer"
- omschrijving: korte omschrijving van de werkzaamheden of gevraagde offerte, max 120 tekens
- status: bepaal zelf op basis van de tekst: "offerte" als het een prijsaanvraag of offerteverzoek is, "lopend" als het een opdracht of werkopdracht is

Tekst:
${tekst.substring(0, 4000)}`
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content[0].text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(raw);

    const geldige_statussen = ['offerte','lopend','wacht','oplevering','klaar'];
    if (parsed.status && geldige_statussen.includes(parsed.status))
      document.getElementById('f-status').value = parsed.status;
    if (parsed.nummer)        document.getElementById('f-nummer').value = parsed.nummer;
    if (parsed.adres)         document.getElementById('f-adres').value = parsed.adres;
    if (parsed.opdrachtgever) document.getElementById('f-opdrachtgever').value = parsed.opdrachtgever;
    if (parsed.contact)       document.getElementById('f-contact').value = parsed.contact;
    if (parsed.aanmelder)     document.getElementById('f-aanmelder').value = parsed.aanmelder;
    if (parsed.omschrijving)  document.getElementById('f-notitie').value = parsed.omschrijving;

    resultEl.textContent = `✓ Uitgelezen: ${parsed.nummer || '?'} — ${parsed.adres || '?'}`;
    resultEl.className = 'ai-result show';

  } catch (err) {
    resultEl.textContent = 'Fout bij uitlezen: ' + err.message;
    resultEl.className = 'ai-result show error';
  } finally {
    document.getElementById('ai-loading').classList.remove('show');
  }
}



function getFiltered() {
  return projecten.filter(p => {
    const matchFilter = activeFilter === 'alle' || p.status === activeFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || [p.nummer, p.adres, p.opdrachtgever, p.actie, p.notitie, p.contact].some(v => (v||'').toLowerCase().includes(q));
    return matchFilter && matchSearch;
  }).sort((a, b) => {
    let av = a[sortKey] || '', bv = b[sortKey] || '';
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

function dateClass(ds) {
  if (!ds) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = (new Date(ds) - today) / 86400000;
  return diff < 0 ? 'urgent' : diff <= 3 ? 'soon' : '';
}

function fmt(ds) {
  if (!ds) return '';
  const [y,m,d] = ds.split('-');
  return `${d}-${m}-${y}`;
}

function render() {
  const data = getFiltered();
  document.getElementById('stat-lopend').textContent = projecten.filter(p => p.status === 'lopend').length;
  document.getElementById('stat-wacht').textContent  = projecten.filter(p => p.status === 'wacht').length;
  document.getElementById('stat-totaal').textContent = projecten.filter(p => p.status !== 'klaar').length;

  const empty = document.getElementById('empty');
  const tbody = document.getElementById('tbody');
  if (data.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; }
  else {
    empty.style.display = 'none';
    tbody.innerHTML = data.map(p => `
      <tr onclick="openModal(${p.id})">
        <td><div class="proj-num">${p.nummer}</div></td>
        <td>
          <div class="proj-addr">${p.adres}</div>
          ${p.notitie ? `<div class="proj-client">${p.notitie.substring(0,55)}${p.notitie.length>55?'…':''}</div>` : ''}
        </td>
        <td>
          <div style="font-size:13px">${p.opdrachtgever}</div>
          ${p.contact ? `<div class="proj-client">${p.contact.split('—')[0].trim()}</div>` : ''}
        </td>
        <td><span class="status-badge ${STATUS_CLASS[p.status]}"><span class="status-dot"></span>${STATUS_LABELS[p.status]}</span></td>
        <td>
          <div class="actie-cell">${p.actie || '—'}</div>
          ${p.datum ? `<div class="actie-date ${dateClass(p.datum)}">${fmt(p.datum)}</div>` : ''}
        </td>
      </tr>`).join('');
  }

  document.getElementById('cards').innerHTML = data.map(p => `
    <div class="card" onclick="openModal(${p.id})">
      <div class="card-top">
        <span class="card-num">${p.nummer}</span>
        <span class="status-badge ${STATUS_CLASS[p.status]}"><span class="status-dot"></span>${STATUS_LABELS[p.status]}</span>
      </div>
      <div class="card-addr">${p.adres}</div>
      <div class="card-client">${p.opdrachtgever}${p.contact ? ' · ' + p.contact.split('—')[0].trim() : ''}</div>
      ${p.notitie ? `<div class="card-actie" style="color:var(--muted);font-size:12px;margin-bottom:6px">${p.notitie.substring(0,80)}…</div>` : ''}
      ${p.actie ? `<div class="card-actie">${p.actie}</div>` : ''}
      ${p.datum ? `<div class="card-date ${dateClass(p.datum)}">${fmt(p.datum)}</div>` : ''}
    </div>`).join('') || '<div style="color:var(--muted);font-size:13px;padding:20px 0">Geen projecten gevonden.</div>';
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  render();
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });

function openModal(id) {
  editingId = id || null;
  const isNew = !id;
  document.getElementById('upload-section').style.display = isNew ? 'block' : 'none';
  document.getElementById('modal-title').textContent = isNew ? 'NIEUWE OPDRACHT' : 'OPDRACHT BEWERKEN';
  document.getElementById('btn-delete').style.display = isNew ? 'none' : 'block';
  document.getElementById('ai-result').className = 'ai-result';
  document.getElementById('ai-loading').classList.remove('show');

  if (id) {
    const p = projecten.find(x => x.id === id);
    document.getElementById('f-nummer').value = p.nummer;
    document.getElementById('f-adres').value = p.adres;
    document.getElementById('f-opdrachtgever').value = p.opdrachtgever;
    document.getElementById('f-status').value = p.status;
    document.getElementById('f-actie').value = p.actie || '';
    document.getElementById('f-datum').value = p.datum || '';
    document.getElementById('f-contact').value = p.contact || '';
    document.getElementById('f-aanmelder').value = p.aanmelder || '';
    document.getElementById('f-notitie').value = p.notitie || '';
  } else {
    ['f-nummer','f-adres','f-opdrachtgever','f-actie','f-contact','f-aanmelder','f-notitie'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('f-status').value = 'lopend';
    document.getElementById('f-datum').value = '';
    const bonTekst = document.getElementById('bon-tekst'); if (bonTekst) bonTekst.value = '';
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); editingId = null; }

async function agendaPunt() {
  const actie = document.getElementById('f-actie').value.trim();
  const datum = document.getElementById('f-datum').value;
  const nummer = document.getElementById('f-nummer').value.trim();
  const adres = document.getElementById('f-adres').value.trim();

  if (!actie) { alert('Vul eerst een volgende actie in.'); return; }
  if (!datum) { alert('Vul eerst een actiedatum in.'); return; }

  const btn = document.getElementById('btn-agenda');
  btn.textContent = '⏳';
  btn.disabled = true;

  try {
    if (!apiKey) { alert('API key ontbreekt.'); btn.textContent = '📅'; btn.disabled = false; return; }

    // Aanroepen via Claude API met Google Calendar MCP
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        mcp_servers: [{ type: 'url', url: 'https://gcal.mcp.claude.com/mcp', name: 'gcal' }],
        messages: [{
          role: 'user',
          content: `Maak een Google Calendar afspraak aan met deze gegevens:
- Titel: ${nummer ? nummer + ' — ' : ''}${actie}
- Datum: ${datum} (hele dag)
- Beschrijving: ${adres || ''}
Gebruik de create_event tool. Bevestig alleen met "OK" als het gelukt is.`
        }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    btn.textContent = '✓';
    btn.classList.add('success');
    setTimeout(() => { btn.textContent = '📅'; btn.classList.remove('success'); btn.disabled = false; }, 2500);

  } catch (err) {
    btn.textContent = '📅';
    btn.disabled = false;
    alert('Agendapunt mislukt: ' + err.message);
  }
}

function saveProject() {
  const p = {
    nummer:        document.getElementById('f-nummer').value.trim(),
    adres:         document.getElementById('f-adres').value.trim(),
    opdrachtgever: document.getElementById('f-opdrachtgever').value.trim(),
    status:        document.getElementById('f-status').value,
    actie:         document.getElementById('f-actie').value.trim(),
    datum:         document.getElementById('f-datum').value,
    contact:       document.getElementById('f-contact').value.trim(),
    aanmelder:     document.getElementById('f-aanmelder').value.trim(),
    notitie:       document.getElementById('f-notitie').value.trim(),
  };
  if (!p.nummer || !p.adres) { alert('Vul minimaal kenmerk en adres in.'); return; }
  if (editingId) {
    const idx = projecten.findIndex(x => x.id === editingId);
    projecten[idx] = { ...projecten[idx], ...p };
    slaOpInDb(projecten[idx]);
  } else {
    const nieuw = { id: nextId++, ...p };
    projecten.push(nieuw);
    slaOpInDb(nieuw);
  }
  closeModal();
  render();
}

function deleteProject() {
  if (!confirm('Project verwijderen?')) return;
  verwijderUitDb(editingId);
  projecten = projecten.filter(x => x.id !== editingId);
  closeModal();
  render();
}

document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// upload-zone verwijderd

initApiKey();
if (sbUrl && sbKey) laadProjecten(); else render();
</script>
